events {}

http {

  error_log /var/log/nginx/error.log;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  map $http_origin $cors_origin {
    ~^http://localhost:5173$                        $http_origin;
    ~^http://localhost:3000$                        $http_origin;
    ~^https://real-time-chatting-ui\.vercel\.app$   $http_origin;
    default                                         "";
  }

  server {
    listen 3000;

    resolver 8.8.8.8 valid=30s ipv6=off;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    location /auth/ {
      if ($request_method = OPTIONS) { return 204; }

      limit_req zone=api_limit burst=20 nodelay;
      set $auth_upstream "authservice-ic61.onrender.com";
      proxy_pass https://$auth_upstream/;
      proxy_ssl_server_name on;
      proxy_set_header Host $auth_upstream;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /profile/ {
      if ($request_method = OPTIONS) { return 204; }

      limit_req zone=api_limit burst=20 nodelay;
      set $profile_upstream "profileservice-d1cv.onrender.com";
      proxy_pass https://$profile_upstream/;
      proxy_ssl_server_name on;
      proxy_set_header Host $profile_upstream;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /request/ {
      if ($request_method = OPTIONS) { return 204; }

      limit_req zone=api_limit burst=20 nodelay;
      set $request_upstream "requestservice.onrender.com";
      proxy_pass https://$request_upstream/;
      proxy_ssl_server_name on;
      proxy_set_header Host $request_upstream;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /chat/ {
      if ($request_method = OPTIONS) { return 204; }

      client_max_body_size 6m;
      set $chat_upstream "chatservice-ai59.onrender.com";
      proxy_pass https://$chat_upstream/;
      proxy_ssl_server_name on;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $chat_upstream;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
      return 200 "API Gateway is healthy";
    }
  }
}
