events {}

http {

  error_log  /var/log/nginx/error.log;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  server {
    listen 3000;

    resolver 100.100.100.100 valid=10s ipv6=off;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    set $cors_origin "";

    if ($http_origin ~* (http://localhost:5173|http://localhost:3000|https://VERCEL_URL)) {
        set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    location / {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $cors_origin;
        add_header Access-Control-Allow-Credentials true;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        return 204;
      }
    }

    location /auth/ {
      limit_req zone=api_limit burst=20 nodelay;

      set $auth_upstream "auth-service.railway.internal";
      proxy_pass http://$auth_upstream:5000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /profile/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $cors_origin;
        add_header Access-Control-Allow-Credentials true;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        return 204;
      }

      limit_req zone=api_limit burst=20 nodelay;

      set $profile_upstream "profile-service.railway.internal";
      proxy_pass http://$profile_upstream:5001/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /request/ {
      limit_req zone=api_limit burst=20 nodelay;

      set $request_upstream "request-service.railway.internal";
      proxy_pass http://$request_upstream:5002/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /chat/ {
      client_max_body_size 6m;

      set $chat_upstream "chat-service.railway.internal";
      proxy_pass http://$chat_upstream:5003/;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
      return 200 "API Gateway is healthy";
    }
  }
}
